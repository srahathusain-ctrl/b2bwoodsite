<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SteelWood B2B Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080B0F;--s1:#0F1318;--s2:#161B24;--s3:#1E2535;
  --b1:#1A2030;--b2:#243040;--b3:#2E3D52;
  --acc:#00E5A0;--acc2:#0070FF;--amber:#F5A623;--red:#FF4060;--violet:#7C6EFF;
  --t1:#EDF2FF;--t2:#8A9BB8;--t3:#4A5870;--t4:#2A3448;
  --r:10px;--font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
  --glow:0 0 32px rgba(0,229,160,.12);
}
html,body,#root{height:100%;width:100%}
body{background:var(--bg);color:var(--t1);font-family:var(--font-b);font-size:14px;overflow:hidden}
button{font-family:var(--font-b);cursor:pointer;border:none;background:none}
input,textarea{font-family:var(--font-b)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}

/* ── TICKER ── */
.ticker{height:34px;background:linear-gradient(90deg,#071A12,#07121E);border-bottom:1px solid var(--b1);display:flex;align-items:center;overflow:hidden;flex-shrink:0;position:relative;z-index:99}
.ticker-lbl{background:var(--acc);color:#000;font-family:var(--font-h);font-size:9px;font-weight:800;letter-spacing:.14em;padding:0 14px;height:100%;display:flex;align-items:center;flex-shrink:0;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 50%,calc(100% - 8px) 100%,0 100%);padding-right:22px}
.ticker-scroll{flex:1;overflow:hidden;mask-image:linear-gradient(90deg,transparent,black 40px,black calc(100% - 40px),transparent)}
.ticker-track{display:flex;animation:scrollTicker 50s linear infinite;width:max-content}
.ticker-track:hover{animation-play-state:paused}
.t-item{display:flex;align-items:center;gap:8px;padding:0 24px;white-space:nowrap;font-size:12px;color:var(--t2)}
.t-tag{font-size:9px;font-weight:700;font-family:var(--font-h);padding:2px 7px;border-radius:4px;letter-spacing:.06em}
.t-tag.g{background:rgba(0,229,160,.15);color:var(--acc);border:1px solid rgba(0,229,160,.25)}
.t-tag.a{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.t-tag.b{background:rgba(0,112,255,.12);color:#5B9EFF;border:1px solid rgba(0,112,255,.2)}
.t-sep{color:var(--b3);padding:0 4px}
@keyframes scrollTicker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100vh}
.body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:64px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;align-items:center;padding:14px 0 16px;flex-shrink:0;gap:2px}
.logo{width:36px;height:36px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:var(--glow);cursor:pointer;flex-shrink:0}
.logo svg{width:18px;height:18px}
.nav-grp{display:flex;flex-direction:column;align-items:center;gap:2px;width:100%}
.n-sep{width:28px;height:1px;background:var(--b1);margin:8px 0}
.nb{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;color:var(--t3);transition:all .15s;position:relative}
.nb:hover{background:var(--s2);color:var(--t2);border-color:var(--b1)}
.nb.on{background:rgba(0,229,160,.1);color:var(--acc);border-color:rgba(0,229,160,.2)}
.nb svg{width:17px;height:17px;stroke-width:1.6}
.nb-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid var(--s1)}
.nb-tip{position:absolute;left:calc(100% + 8px);background:var(--s2);border:1px solid var(--b2);color:var(--t1);padding:4px 10px;border-radius:6px;font-size:11px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300}
.nb:hover .nb-tip{opacity:1}
.sb-bot{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:8px}
.av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--acc2),var(--acc));padding:2px;cursor:pointer}
.av-i{width:100%;height:100%;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:11px;font-weight:700}
.pulse{width:7px;height:7px;background:var(--acc);border-radius:50%;animation:pulse 2.2s infinite;box-shadow:0 0 6px var(--acc)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}

/* ── MAIN AREA ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── TOP BAR ── */
.topbar{height:56px;border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;background:var(--s1)}
.tb-title{font-family:var(--font-h);font-size:15px;font-weight:700;color:var(--t1);flex:1}
.tb-sub{font-size:11px;color:var(--t3);font-weight:400;margin-left:8px;font-family:var(--font-b)}
.tb-search{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:6px 12px;transition:border-color .2s;width:220px}
.tb-search:focus-within{border-color:var(--acc)}
.tb-search svg{width:13px;height:13px;color:var(--t3);flex-shrink:0;stroke-width:2}
.tb-search input{background:none;border:none;outline:none;color:var(--t1);font-size:12px;width:100%}
.tb-search input::placeholder{color:var(--t3)}
.tb-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);font-size:12px;transition:all .15s}
.tb-btn:hover{border-color:var(--b3);color:var(--t1)}
.tb-btn.pri{background:var(--acc);border-color:var(--acc);color:#000;font-weight:600}
.tb-btn.pri:hover{background:#00cc8e}
.tb-btn svg{width:13px;height:13px;stroke-width:2}
.nb2{width:34px;height:34px;border-radius:8px;border:1px solid var(--b1);background:var(--s2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);transition:all .15s;position:relative}
.nb2:hover{border-color:var(--b2);color:var(--t1)}
.nb2 svg{width:15px;height:15px;stroke-width:1.8}
.nb2-dot{position:absolute;top:7px;right:7px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1.5px solid var(--s1)}

/* ── CONTENT ── */
.page{flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:18px}
.page::-webkit-scrollbar{width:4px}

/* ── GRID UTILS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g-main{display:grid;grid-template-columns:1.7fr 1fr;gap:16px}

/* ── CARD ── */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--b2)}
.ch{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--b1)}
.ch-t{font-family:var(--font-h);font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;color:var(--t1)}
.ch-t svg{width:13px;height:13px;color:var(--acc);stroke-width:2.2}
.ch-a{font-size:11px;color:var(--acc);cursor:pointer;display:flex;align-items:center;gap:3px;transition:opacity .15s}
.ch-a:hover{opacity:.7}
.ch-a svg{width:11px;height:11px;stroke-width:2.5}
.cb{padding:14px 18px}

/* ── METRIC ── */
.mc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:15px 17px;position:relative;overflow:hidden;cursor:default;transition:all .2s}
.mc:hover{border-color:var(--b2);transform:translateY(-2px)}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--mc-clr,var(--acc)),transparent)}
.mc.b{--mc-clr:var(--acc2)}
.mc.a{--mc-clr:var(--amber)}
.mc.r{--mc-clr:var(--red)}
.mc.v{--mc-clr:var(--violet)}
.mc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.mc-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.mc-ico svg{width:15px;height:15px;stroke-width:1.8}
.mc-ico.g{background:rgba(0,229,160,.1);color:var(--acc)}
.mc-ico.b{background:rgba(0,112,255,.1);color:#5B9EFF}
.mc-ico.a{background:rgba(245,166,35,.1);color:var(--amber)}
.mc-ico.r{background:rgba(255,64,96,.1);color:var(--red)}
.mc-ico.v{background:rgba(124,110,255,.1);color:var(--violet)}
.delta{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:rgba(0,229,160,.1);color:var(--acc)}
.delta.n{background:rgba(255,64,96,.1);color:var(--red)}
.delta.a{background:rgba(245,166,35,.1);color:var(--amber)}
.mc-v{font-family:var(--font-h);font-size:22px;font-weight:800;color:var(--t1);line-height:1;margin-bottom:3px}
.mc-l{font-size:11px;color:var(--t3)}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);text-align:left;padding:0 12px 9px;border-bottom:1px solid var(--b1)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--b1);font-size:12px;color:var(--t2)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.015);cursor:pointer}
.td-b{color:var(--t1) !important;font-weight:500}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.04em}
.pill::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.p-g{background:rgba(0,229,160,.1);color:var(--acc)}
.p-a{background:rgba(245,166,35,.1);color:var(--amber)}
.p-r{background:rgba(255,64,96,.1);color:var(--red)}
.p-b{background:rgba(0,112,255,.1);color:#5B9EFF}
.p-v{background:rgba(124,110,255,.1);color:var(--violet)}

/* ── LOGIN ── */
.login-wrap{height:100%;display:flex;overflow:hidden}
.login-left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;background:var(--bg);position:relative}
.login-left::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,var(--b2) 30%,var(--acc) 50%,var(--b2) 70%,transparent)}
.login-bg-orb{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,160,.05) 0%,transparent 70%);pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%)}
.login-right{width:480px;background:linear-gradient(135deg,var(--s1) 0%,#0A1020 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;border-left:1px solid var(--b1)}
.login-form{width:100%;max-width:340px}
.lf-logo{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.lf-logo-icon{width:42px;height:42px;background:var(--acc);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:var(--glow)}
.lf-logo-icon svg{width:22px;height:22px}
.lf-logo-text{font-family:var(--font-h);font-size:18px;font-weight:800;color:var(--t1)}
.lf-logo-sub{font-size:10px;color:var(--t3);letter-spacing:.06em;font-weight:400}
.lf-title{font-family:var(--font-h);font-size:22px;font-weight:800;color:var(--t1);margin-bottom:6px}
.lf-sub{font-size:12px;color:var(--t3);margin-bottom:28px}
.lf-label{font-size:11px;color:var(--t2);margin-bottom:6px;font-weight:500;display:block}
.lf-input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:9px;padding:11px 14px;color:var(--t1);font-size:13px;outline:none;transition:border-color .2s;margin-bottom:14px}
.lf-input:focus{border-color:var(--acc)}
.lf-input::placeholder{color:var(--t4)}
.lf-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.lf-check{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2);cursor:pointer}
.lf-link{font-size:12px;color:var(--acc);cursor:pointer;transition:opacity .15s}
.lf-link:hover{opacity:.7}
.lf-btn{width:100%;padding:13px;border-radius:9px;background:var(--acc);color:#000;font-family:var(--font-h);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;border:none;margin-bottom:16px}
.lf-btn:hover{background:#00cc8e;transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,229,160,.25)}
.lf-divider{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.lf-divider::before,.lf-divider::after{content:'';flex:1;height:1px;background:var(--b1)}
.lf-divider span{font-size:11px;color:var(--t3)}
.lf-sso{width:100%;padding:11px;border-radius:9px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.lf-sso:hover{border-color:var(--b3);color:var(--t1)}
.login-brand{position:relative;z-index:1;text-align:center}
.lb-tag{display:inline-block;background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.2);color:var(--acc);font-size:10px;font-weight:700;font-family:var(--font-h);letter-spacing:.1em;padding:5px 14px;border-radius:20px;margin-bottom:24px}
.lb-title{font-family:var(--font-h);font-size:36px;font-weight:800;color:var(--t1);line-height:1.15;margin-bottom:16px}
.lb-title span{color:var(--acc)}
.lb-sub{font-size:14px;color:var(--t2);line-height:1.7;max-width:420px;margin:0 auto 32px}
.lb-features{display:flex;flex-direction:column;gap:12px;text-align:left;max-width:380px;margin:0 auto}
.lb-feat{display:flex;align-items:center;gap:12px;background:var(--s1);border:1px solid var(--b1);border-radius:9px;padding:11px 14px}
.lb-feat-ico{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lb-feat-ico svg{width:14px;height:14px;stroke-width:1.8}
.lb-feat-ico.g{background:rgba(0,229,160,.1);color:var(--acc)}
.lb-feat-ico.b{background:rgba(0,112,255,.1);color:#5B9EFF}
.lb-feat-ico.a{background:rgba(245,166,35,.1);color:var(--amber)}
.lb-feat-ico.v{background:rgba(124,110,255,.1);color:var(--violet)}
.lb-feat-t{font-size:12px;font-weight:500;color:var(--t1)}
.lb-feat-s{font-size:11px;color:var(--t3);margin-top:1px}

/* ── OFFER ITEMS ── */
.offer-item{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:8px}
.offer-item:hover{border-color:var(--acc);background:rgba(0,229,160,.04)}
.offer-item:last-child{margin-bottom:0}
.o-tag{font-size:9px;font-weight:800;font-family:var(--font-h);padding:3px 8px;border-radius:5px;letter-spacing:.05em;flex-shrink:0}
.o-tag.g{background:var(--acc);color:#000}
.o-tag.a{background:var(--amber);color:#000}
.o-tag.b{background:var(--acc2);color:#fff}
.o-txt{flex:1}
.o-name{font-size:12px;font-weight:500;color:var(--t1)}
.o-sub{font-size:11px;color:var(--t3);margin-top:2px}
.o-exp{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:4px;flex-shrink:0}
.o-exp svg{width:10px;height:10px;stroke-width:2}

/* ── DOC ITEMS ── */
.doc-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.doc-item:hover{background:var(--s2);border-color:var(--b1)}
.doc-item.on{background:rgba(0,229,160,.06);border-color:rgba(0,229,160,.15)}
.di-ico{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.di-ico.pdf{background:rgba(255,64,96,.12)}
.di-ico.xls{background:rgba(0,229,160,.1)}
.di-ico.dwg{background:rgba(0,112,255,.1)}
.di-ico.doc{background:rgba(124,110,255,.1)}
.di-meta{flex:1;min-width:0}
.di-name{font-size:12px;color:var(--t1);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.di-date{font-size:10px;color:var(--t3);margin-top:2px}
.di-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(0,229,160,.1);color:var(--acc);flex-shrink:0}
.di-badge.new{background:rgba(255,64,96,.1);color:var(--red)}
.di-badge.live{background:rgba(0,229,160,.15);color:var(--acc);animation:pulse 2s infinite}
.doc-grp-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);padding:10px 12px 5px}

/* ── PRODUCT CARD ── */
.prod-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s}
.prod-card:hover{border-color:var(--b3);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.3)}
.pc-img{height:100px;background:linear-gradient(135deg,var(--s2),var(--s3));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pc-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,var(--s1))}
.pc-tag{position:absolute;top:10px;left:10px;z-index:1;font-size:9px;font-weight:800;font-family:var(--font-h);padding:3px 8px;border-radius:4px;letter-spacing:.06em}
.pc-tag.cert{background:rgba(0,229,160,.2);color:var(--acc);border:1px solid rgba(0,229,160,.3)}
.pc-tag.fr{background:rgba(255,64,96,.15);color:var(--red);border:1px solid rgba(255,64,96,.25)}
.pc-tag.mr{background:rgba(0,112,255,.15);color:#5B9EFF;border:1px solid rgba(0,112,255,.25)}
.pc-tag.ac{background:rgba(124,110,255,.15);color:var(--violet);border:1px solid rgba(124,110,255,.25)}
.pc-body{padding:13px 14px}
.pc-name{font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px}
.pc-spec{font-size:11px;color:var(--t3);margin-bottom:10px;line-height:1.5}
.pc-price{font-family:var(--font-h);font-size:16px;font-weight:800;color:var(--acc);margin-bottom:10px}
.pc-price span{font-size:11px;color:var(--t3);font-family:var(--font-b);font-weight:400}
.pc-actions{display:flex;gap:8px}
.pc-btn{flex:1;padding:8px;border-radius:7px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.pc-btn:hover{border-color:var(--b3);color:var(--t1)}
.pc-btn.pri{background:rgba(0,229,160,.1);border-color:rgba(0,229,160,.2);color:var(--acc)}
.pc-btn.pri:hover{background:rgba(0,229,160,.18)}
.pc-btn svg{width:11px;height:11px;stroke-width:2}

/* ── SUPPORT PAGE ── */
.support-layout{display:flex;gap:16px;flex:1;min-height:0}
.chat-panel{flex:1;display:flex;flex-direction:column;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}

.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}

function SupportPage({setPage}){
  const [msgs,setMsgs]=useState([
    {role:'bot',text:'Hello Danish! I\'m your SteelWood AI assistant, available 24×7. I can help with order tracking, invoices, technical documentation, product specs, and more. What can I help you with today?',time:'Now'},
  ]);
  const [input,setInput]=useState('');
  const msgsRef=useRef(null);
  const quickReplies=[
    'Track my latest order',
    'Download FR-18 spec sheet',
    'Invoice status INV-0312',
    'MoistureSeal stock availability',
    'Talk to a human agent',
  ];
  const botResponses={
    'track':'Your latest order ORD-3841 (FR-18 Fire Rated 18mm × 800 pcs) was dispatched on Mar 4 and is currently en route. ETA is March 8, 2025. Tracking ID: DHL-AE-9921883. Would you like the full delivery note?',
    'spec':'The FR-18 Fire Rated Spec Sheet (v3.2, updated Feb 28) is available in your Document Vault. It covers EN 13501 Class A1 fire rating, UAE Fire Code compliance data, and installation guidelines. Shall I send you the download link?',
    'invoice':'Invoice INV-2025-0312 for AED 84,200 is currently due on March 15, 2025. Payment can be made via bank transfer to ENBD Account 102-XXXXXX or via your registered payment portal. Shall I email you the full invoice PDF?',
    'stock':'MoistureSeal Plus 15mm is currently in stock with 1,800 sheets available at our Jebel Ali warehouse. Lead time is 3–5 business days to any GCC destination. Would you like to place an order or get a quote?',
    'human':'Connecting you to a live agent now. Our team is available 24×7. Average wait time right now is under 2 minutes. You can also reach us at +971-4-XXX-XXXX.',
    'default':'Thanks for your query. I\'m looking into that for you right now. For complex requests, I can escalate to a human agent with full context transferred. Anything else I can help with?',
  };
  const sendMsg=(text)=>{
    if(!text.trim())return;
    const userMsg={role:'user',text,time:'Now'};
    setMsgs(m=>[...m,userMsg]);
    setInput('');
    setTimeout(()=>{
      const lc=text.toLowerCase();
      let resp=botResponses.default;
      if(lc.includes('track')||lc.includes('order'))resp=botResponses.track;
      else if(lc.includes('spec')||lc.includes('fr-18')||lc.includes('spec sheet'))resp=botResponses.spec;
      else if(lc.includes('invoice'))resp=botResponses.invoice;
      else if(lc.includes('stock')||lc.includes('moisture'))resp=botResponses.stock;
      else if(lc.includes('human')||lc.includes('agent'))resp=botResponses.human;
      setMsgs(m=>[...m,{role:'bot',text:resp,time:'Just now'}]);
    },700);
  };
  useEffect(()=>{if(msgsRef.current)msgsRef.current.scrollTop=msgsRef.current.scrollHeight;},[msgs]);
  const tickets=[
    {id:'#4821',title:'FR-18 Fire Rating Query',status:'Resolved',scls:'p-g',date:'Mar 5'},
    {id:'#4798',title:'Delivery Delay — DN-0481',status:'Resolved',scls:'p-g',date:'Feb 19'},
    {id:'#4812',title:'Invoice Discrepancy INV-0298',status:'In Progress',scls:'p-a',date:'Feb 28'},
  ];
  return(
    <>
      <TopBar title="Support Centre" sub="24 × 7 · AI-powered · Human escalation" setPage={setPage}
        actions={<button className="tb-btn pri">{I.plus}New Ticket</button>}/>
      <div className="page" style={{flexDirection:'row',gap:16,flex:1,minHeight:0,overflowY:'visible'}}>
        <div className="chat-panel" style={{flex:1}}>
          <div className="chat-head">
            <div className="chat-av">{I.star}</div>
            <div className="chat-info">
              <div className="chat-name">SteelWood AI Assistant</div>
              <div className="chat-status">Online · 24 × 7 active</div>
            </div>
            <button className="tb-btn">{I.phone}Call Agent</button>
          </div>
          <div className="chat-msgs" ref={msgsRef}>
            {msgs.map((m,i)=>(
              <div key={i} className={`msg ${m.role}`}>
                <div className={`msg-av ${m.role}`}>{m.role==='bot'?'AI':'DH'}</div>
                <div>
                  <div className="msg-bubble">{m.text}</div>
                  <div className="msg-time">{m.time}</div>
                </div>
              </div>
            ))}
          </div>
          <div className="chat-input-wrap">
            <div className="chat-input">
              {I.chat}
              <input value={input} onChange={e=>setInput(e.target.value)} placeholder="Type your message…" onKeyDown={e=>e.key==='Enter'&&sendMsg(input)}/>
              <button className="send-btn" onClick={()=>sendMsg(input)}>{I.send}</button>
            </div>
            <div className="quick-btns">
              {quickReplies.map(q=><button key={q} className="q-btn" onClick={()=>sendMsg(q)}>{q}</button>)}
            </div>
          </div>
        </div>
        <div style={{width:260,display:'flex',flexDirection:'column',gap:14}}>
          <div className="card">
            <div className="ch"><div className="ch-t">{I.shield}Support Channels</div></div>
            <div className="cb" style={{display:'flex',flexDirection:'column',gap:8}}>
              {[{ico:'chat',lbl:'Live Chat',sub:'&lt;2 min avg',cls:'g'},{ico:'phone',lbl:'+971-4-XXX-XXXX',sub:'24 × 7 hotline',cls:'b'},{ico:'mail',lbl:'support@steelwood.ae',sub:'SLA 4hr response',cls:'a'},{ico:'doc',lbl:'Knowledge Base',sub:'FAQs & guides',cls:'v'}].map((c,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 11px',background:'var(--s2)',border:'1px solid var(--b1)',borderRadius:8,cursor:'pointer',transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(0,229,160,.2)'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--b1)'}}>
                  <div className={`mc-ico ${c.cls}`} style={{width:28,height:28,borderRadius:7}}>{I[c.ico]}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500,color:'var(--t1)'}}>{c.lbl}</div>
                    <div style={{fontSize:10,color:'var(--t3)'}} dangerouslySetInnerHTML={{__html:c.sub}}/>
                  </div>
                  <span style={{color:'var(--t3)',fontSize:14}}>›</span>
                </div>
              ))}
            </div>
          </div>
          <div className="card" style={{flex:1}}>
            <div className="ch"><div className="ch-t">{I.doc}Open Tickets</div></div>
            <div style={{padding:'4px 8px'}}>
              {tickets.map((t,i)=>(
                <div key={i} className="doc-item">
                  <div className="di-meta">
                    <div className="di-name">{t.id} · {t.title}</div>
                    <div className="di-date">{t.date}</div>
                  </div>
                  <span className={`pill ${t.scls}`}>{t.status}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

/* ─── ROOT APP ─── */
function App(){
  const [auth,setAuth]=useState(false);
  const [page,setPage]=useState('dashboard');
  if(!auth) return <LoginPage onLogin={()=>setAuth(true)}/>;
  const pages={
    dashboard:<Dashboard setPage={setPage}/>,
    orders:<OrdersPage setPage={setPage}/>,
    docs:<DocsPage setPage={setPage}/>,
    delivery:<DeliveryPage setPage={setPage}/>,
    invoices:<InvoicesPage setPage={setPage}/>,
    catalogue:<CataloguePage setPage={setPage}/>,
    offers:<OffersPage setPage={setPage}/>,
    support:<SupportPage setPage={setPage}/>,
    account:<AccountPage setPage={setPage}/>,
    settings:<SettingsPage setPage={setPage}/>,
  };
  return(
    <div className="app">
      <Ticker/>
      <div className="body">
        <Sidebar page={page} setPage={setPage} onLogout={()=>setAuth(false)}/>
        <div className="main">{pages[page]||pages.dashboard}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
